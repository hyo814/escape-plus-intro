{% extends "base.html" %}

{% block title %}로그인{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-box-arrow-in-right me-2"></i>로그인</h3>
                {% if form.non_field_errors %}
                <div class="alert alert-danger">
                    {% for error in form.non_field_errors %}
                    <p class="mb-0">{{ error }}</p>
                    {% endfor %}
                </div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">아이디</label>
                        <input type="text" name="username" id="id_username" class="form-control form-control-lg"
                               placeholder="아이디를 입력하세요" required>
                    </div>
                    <div class="mb-4">
                        <label for="id_password" class="form-label">비밀번호</label>
                        <input type="password" name="password" id="id_password" class="form-control form-control-lg"
                               placeholder="비밀번호를 입력하세요" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">로그인</button>
                </form>
                <hr>
                <a href="{% url 'accounts:kakao_login' %}" class="btn btn-lg w-100 mb-3 bg-[#FEE500] text-[#3C1E1E] font-bold">
                    <i class="bi bi-chat-fill me-1"></i>카카오 로그인
                </a>
                <p class="text-center mt-3 mb-0">
                    계정이 없으신가요? <a href="{% url 'accounts:register' %}">회원가입</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
