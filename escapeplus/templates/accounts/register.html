{% extends "base.html" %}

{% block title %}회원가입{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-person-plus me-2"></i>회원가입</h3>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                        <input type="{{ field.field.widget.input_type }}"
                               name="{{ field.html_name }}"
                               id="{{ field.id_for_label }}"
                               class="form-control form-control-lg {% if field.errors %}is-invalid{% endif %}"
                               placeholder="{{ field.label }}"
                               value="{{ field.value|default:'' }}">
                        {% if field.help_text %}
                        <div class="form-text">{{ field.help_text }}</div>
                        {% endif %}
                        {% if field.errors %}
                        <div class="invalid-feedback">{{ field.errors.0 }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">회원가입</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    이미 계정이 있으신가요? <a href="{% url 'accounts:login' %}">로그인</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
